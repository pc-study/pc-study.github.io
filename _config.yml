# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
Source: https://github.com/hexojs/hexo/

# Site
title: 三笠丶的博客
subtitle: 'DBA学习之路'
description: '数据库技术博客'
keywords:
author: 三笠丶
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://pc-study.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_archive:/:year/

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: post
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
deploy:
  type: git
  repo: https://github.com/pc-study/pc-study.github.io.git
  branch: gh-pages
